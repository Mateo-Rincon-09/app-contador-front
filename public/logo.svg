<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo elegante -->
  <rect width="200" height="200" rx="40" fill="#0A0F1C"/>

  <!-- Isotipo abstracto: flujo financiero + crecimiento -->
  <g stroke="url(#grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Línea principal ascendente -->
    <path d="M50 140 C75 100, 125 100, 150 70"/>
    <!-- Curva secundaria que da sensación de flujo -->
    <path d="M50 130 C80 90, 120 110, 150 80"/>
  </g>

  <!-- Punto de foco: objetivo / meta financiera -->
  <circle cx="150" cy="70" r="6" fill="url(#grad)"/>

  <!-- Gradiente moderno -->
  <defs>
    <linearGradient id="grad" x1="50" y1="140" x2="150" y2="70" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
  </defs>
</svg>